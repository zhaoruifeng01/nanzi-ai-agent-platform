version: '3.8'

services:
  ai-agent:
    image: yunshu-ai-agent:latest
    container_name: yunshu-ai-agent
    ports:
      - "8001:8001"
    volumes:
      # 请将下面的 /path/to/your/oracle/instantclient 替换为您宿主机上实际的 Oracle 客户端路径
      - /app/yunshu-aiagent/lib/instantclient_19_30:/opt/oracle/instantclient
      - ./data:/app/data
      - ~/.agents/skills:/app/data/skills

    environment:
      # Service Config
      - API_SERVICE_ENV=${API_SERVICE_ENV:-prod}
      - API_SERVICE_LOG_LEVEL=${API_SERVICE_LOG_LEVEL:-INFO}
      # Oracle Config
      - LD_LIBRARY_PATH=/opt/oracle/instantclient
      - USE_ORACLE_THICK_MODE=${USE_ORACLE_THICK_MODE:-1}  
      
      # MySQL
      - MYSQL_HOST=${MYSQL_HOST:-host.docker.internal}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_DB=${MYSQL_DB:-yunshu_ai_agent_platform}
      - MYSQL_USER=${MYSQL_USER:-root}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-root123}

      # Redis
      - REDIS_HOST=${REDIS_HOST:-host.docker.internal}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-root123}
      - REDIS_ENABLE=${REDIS_ENABLE:-true}

      # Security
      - API_SERVICE_API_KEY_HASH_ALGORITHM=${API_SERVICE_API_KEY_HASH_ALGORITHM:-sha256}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}

      # Jira Integration
      - JIRA_URL=${JIRA_URL}
      - JIRA_USERNAME=${JIRA_USERNAME}
      - JIRA_PASSWORD=${JIRA_PASSWORD}
    restart: unless-stopped
    # 移除 depends_on，由外部保证依赖服务可用
